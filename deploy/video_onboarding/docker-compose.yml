services:
  api:
    build:
      context: ../../microservices/video_onboarding_service
    environment:
      API_HOST: 0.0.0.0
      API_PORT: "8004"
      DB_PATH: /data/video_onboarding.db
      UPLOAD_DIR: /uploads
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      DEMO_MODE: ${DEMO_MODE:-true}
      ORCHESTRATOR_SERVICE_URL: ${ORCHESTRATOR_SERVICE_URL:-http://localhost:8009}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - /opt/video_onboarding/data:/data
      - /opt/video_onboarding/uploads:/uploads
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
